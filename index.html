<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Fake, CT Deepfake Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="site-title">Spot the Fake CT</div>
  <h1>Could you spot a deepfake?</h1>
  <p class="subtitle">AI-generated images and fake quotes are becoming harder to detect. Take this quiz to test your skills and learn more about deep fake technology.</p>
  <div id="quiz-area"></div>
</div>

<script>
const images = [
  { url: "image1.png", label: "AI-generated portrait" },
  { url: "image2.png", label: "AI-generated portrait" },
  { url: "image3.png", label: "AI-generated portrait" }
];

const questions = [
  {
    type: "image", imgIndex: 0,
    prompt: "This face was generated entirely by AI. Which clue is most likely to give it away?",
    choices: ["Smooth, waxy skin", "The subject is smiling", "The background is blurry", "The lighting looks unnatural"],
    correct: 0,
    feedback: "AI-generated faces often have unnaturally smooth skin without any blemishes. Real human skin has texture, imperfections, and variation, AI tends to struggle with these slight variations making it a striking tell."
  },
  {
    type: "headline",
    prompt: "One of these headlines is AI-generated fake news. Which one?",
    headlines: [
      { source: "CT Mirror", text: "Connecticut Senate passes AI bill criminalizing deepfake revenge porn in 24-12 vote" },
      { source: "Hartford Courant", text: "Gov. Lamont signs executive order banning all social media platforms from Connecticut schools" }
    ],
    choices: ["CT Mirror headline", "Hartford Courant headline"],
    correct: 1,
    feedback: "The CT Mirror headline is real, Connecticut's Senate did pass that AI bill in 2024. The Courant headline is fake, the tell for this being the sweeping language used."
  },
  {
    type: "image", imgIndex: 1,
    prompt: "AI image generators frequently fail at a specific part of the face, which part gives it away?",
    choices: ["The ears look too small", "Hair strands blend unnaturally", "The eyes are too far apart", "The face is too symmetrical"],
    correct: 1,
    feedback: "AI generators tend to have trouble with hair with hair typically blending into the background or into the skin."
  },
  {
    type: "headline",
    prompt: "Which of these quotes is AI-fabricated?",
    headlines: [
      { source: "CT Senate debate, 2024", text: "Sen. Saud Anwar (South Windsor): 'Not doing a bill on AI would be malpractice on the part of the legislative body.'" },
      { source: "Hartford Courant", text: "Gov. Lamont: 'Connecticut will lead the nation in AI regulation — we have a moral obligation to act first and act boldly.'" }
    ],
    choices: ["Sen. Anwar quote", "Gov. Lamont quote"],
    correct: 1,
    feedback: "Sen. Anwar's quote is real and on record from the 2024 CT Senate AI debate. The Lamont quote is fabricated. The tells here are once again the sweeping language and if searched there is no record of the quote anywhere."
  },
  {
    type: "image", imgIndex: 2,
    prompt: "All images in this quiz were AI-generated. What is the most common tell in AI background details?",
    choices: ["Backgrounds are always black", "Background details become warped", "Backgrounds are too colorful", "Backgrounds always show outdoor scenes"],
    correct: 1,
    feedback: "AI struggles with background structure details may become warped and make no logical sense."
  },
  {
    type: "headline",
    prompt: "A reporter shared this story on social media. Is it real or AI-generated?",
    headlines: [
      { source: "Cody Enterprise, Wyoming, 2024", text: "Governor's office: 'We have no record of that statement — it was never made.'" }
    ],
    choices: ["Real published denial", "AI-generated fake content"],
    correct: 0,
    feedback: "This is real. After reporter Aaron Pelczar used AI to fabricate a quote from Wyoming's governor in 2024. This went completly unnoticed until a competing journalist called the office to check with the governor."
  },
  {
  type: "audio",
  prompt: "Listen to the first 5 seconds of this clip. Is this Joe Biden's real voice, or an AI voice clone?",
  audioUrl: "https://www.youtube.com/embed/j-8kSh-Q9Mc",
  choices: ["Real voice", "AI voice clone"],
  correct: 1,
  feedback: "This is the 2024 Biden robo call that fooled many voters in New Hampshire.."
},
];


let current = 0, score = 0, answered = false;

const replayQuestions = [
  {
    prompt: "One of these three images is a real photograph. The other two are AI-generated. Which is real?",
    images: [
      { url: "image4.png", label: "Image A" },
      { url: "real1.png", label: "Image B" },
      { url: "image6.png", label: "Image C" }
    ],
    correct: 1,
    feedback: "Image B is the real photograph."
  },
  {
    prompt: "One of these three images is a real photograph. The other two are AI-generated. Which is real?",
    images: [
      { url: "image9.png", label: "Image A" },
      { url: "image10.png", label: "Image B" },
      { url: "real2.png", label: "Image C" }
    ],
    correct: 2,
    feedback: "Image C is the real photograph."
  },
  {
    prompt: "One of these three images is a real photograph. The other two are AI-generated. Which is real?",
    images: [
      { url: "real3.png", label: "Image A" },
      { url: "image11.png", label: "Image B" },
      { url: "image1.png", label: "Image C" }
    ],
    correct: 0,
    feedback: "Image A is the AI photo."
  }
];

let replayMode = false;
let replayCurrent = 0;
let replayScore = 0;
let replayAnswered = false;

function startReplay() {
  replayMode = true;
  replayCurrent = 0;
  replayScore = 0;
  replayAnswered = false;
  renderReplay();
}

function renderReplay() {
  const q = replayQuestions[replayCurrent];
  const pct = (replayCurrent / replayQuestions.length) * 100;
  let html = `
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-label">Replay Mode — Round ${replayCurrent + 1} of ${replayQuestions.length}</div>
    <div class="q-text">${q.prompt}</div>
    <div class="replay-image-grid">
  `;
  q.images.forEach((img, i) => {
    html += `
      <div class="replay-img-card" id="rcard-${i}">
        <img src="${img.url}" alt="${img.label}" onerror="this.style.display='none'"/>
        <div class="replay-img-label">${img.label}</div>
        <button class="replay-pick-btn" onclick="replayPick(${i})">This one</button>
      </div>
    `;
  });
  html += `</div><div id="rfb"></div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function replayPick(i) {
  if (replayAnswered) return;
  replayAnswered = true;
  const q = replayQuestions[replayCurrent];
  const correct = i === q.correct;
  if (correct) replayScore++;

  q.images.forEach((_, idx) => {
    const card = document.getElementById(`rcard-${idx}`);
    const btn = card.querySelector('.replay-pick-btn');
    btn.onclick = null;
    if (idx === q.correct) {
      card.classList.add('replay-correct');
      btn.textContent = '✓ Real photo';
    } else if (idx === i) {
      card.classList.add('replay-wrong');
      btn.textContent = '✗ AI-generated';
    } else {
      card.classList.add('replay-wrong');
      btn.textContent = 'AI-generated';
    }
  });

  document.getElementById('rfb').innerHTML = `
    <div class="feedback ${correct ? 'correct' : 'wrong'}">
      <strong>${correct ? 'Correct!' : 'Not quite.'}</strong> ${q.feedback}
    </div>
    <button class="next-btn" onclick="replayNext()">${replayCurrent < replayQuestions.length - 1 ? 'Next round' : 'See results'}</button>
  `;
}

function replayNext() {
  replayCurrent++;
  replayAnswered = false;
  if (replayCurrent < replayQuestions.length) renderReplay(); else replayResults();
}

function replayResults() {
  const p = Math.round((replayScore / replayQuestions.length) * 100);
  document.getElementById('quiz-area').innerHTML = `
    <div class="score-screen">
      <div class="score-num">${replayScore}/${replayQuestions.length}</div>
      <div class="score-label">Replay Mode — You scored ${p}%</div>
      <div class="verdict">${p === 100 ? 'Perfect eye.' : ''}</div>
      <div class="verdict-sub">${p === 100 ? 'You correctly identified every real photograph. The tells will only get subtler as AI improves.' : 'AI images are designed to fool you.'}</div>
    </div>
    <div style="text-align:center;margin-top:1.5rem;display:flex;gap:10px;justify-content:center">
      <button class="restart-btn" onclick="startReplay()">Replay again</button>
      <button class="restart-btn" onclick="restart()">Back to main quiz</button>
    </div>
  `;
}

function render() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  let html = `
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-label">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.prompt}</div>
  `;
  if (q.type === "image") {
    const img = images[q.imgIndex];
    html += `<div class="image-box">
      <img src="${img.url}" alt="AI generated portrait" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="img-error" style="display:none">Image could not load</div>
      <div class="img-label">${img.label}</div>
    </div>`;
  } 
  else if (q.type === "audio") {
  html += `<div class="audio-box">
    <div class="audio-label">🔊 Listen to the first 5 seconds only, then answer below.</div>
    <iframe width="100%" height="200" src="${q.audioUrl}" frameborder="0" allowfullscreen style="border-radius:8px;margin-top:0.5rem"></iframe>
  </div>`;
} 
  else {
    html += `<div class="headline-box">`;
    q.headlines.forEach(h => {
      html += `<div><div class="headline-source">${h.source}</div><div class="headline-main">"${h.text}"</div></div>`;
    });
    html += `</div>`;
  }
  html += `<div class="choice-grid">`;
  q.choices.forEach((c, i) => {
    html += `<button class="choice-btn" onclick="pick(${i})">${c}</button>`;
  });
  html += `</div><div id="fb"></div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  document.querySelectorAll('.choice-btn').forEach((b, idx) => {
    b.onclick = null;
    if (idx === q.correct) b.className = 'choice-btn reveal';
    if (idx === i && i !== q.correct) b.className = 'choice-btn wrong';
    if (idx === i && i === q.correct) b.className = 'choice-btn correct';
  });
  if (i === q.correct) score++;
  document.getElementById('fb').innerHTML = `
    <div class="feedback ${i === q.correct ? 'correct' : 'wrong'}">
      <strong>${i === q.correct ? 'Correct.' : 'Not quite.'}</strong> ${q.feedback}
    </div>
    <button class="next-btn" onclick="next()">${current < questions.length - 1 ? 'Next question' : 'See results'}</button>
  `;
}

function next() {
  current++; answered = false;
  if (current < questions.length) render(); else results();
}

function results() {
  const p = Math.round((score / questions.length) * 100);
  let v, s;
  if (p >= 80) { v = "Strong result"; s = "You spotted most of the fakes, but as deepfake technology gets stronger it will only get more difficult to tell the difference"; }
  else if (p >= 50) { v = "About average, and that's the problem."; s = "AI technology is very convincing and that's not a personal failure it shows the necessity for companies to give transparency on what is fake and what isn't"; }
  else { v = "Difficult, right?"; s = "Deepfakes are designed to be very close to reality. The difficulty you experienced is why transparency is necessary it is simply not enough to train our eyes."; }

  document.getElementById('quiz-area').innerHTML = `
    <div class="score-screen">
      <div class="score-num">${score}/${questions.length}</div>
      <div class="score-label">You scored ${p}%</div>
      <div class="verdict">${v}</div>
      <div class="verdict-sub">${s}</div>
    </div>
    <div class="signs-section">
      <div class="signs-title">Warning signs to look for in AI-generated content</div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Skin:</strong> unnaturally smooth, waxy, or pore-free texture</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Hair:</strong> strands that blur, merge, or disappear at the edges</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Hands:</strong> wrong number of fingers, fused joints, or impossible bends</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Eyes:</strong> reflections that don't match, or a glassy unfocused look</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Background:</strong> warped structures, repeated objects, or impossible architecture</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Language:</strong> AI fake quotes often sound sweeping, confident, and too perfectly phrased</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Source:</strong> always verify quotes and claims with a second source before sharing</div></div>
    </div>
    <div style="text-align:center;margin-top:1.5rem;display:flex;gap:10px;justify-content:center">
      <button class="restart-btn" onclick="restart()">Try again</button>
      <button class="restart-btn" onclick="startReplay()">Replay mode, spot the real phot</button>
    </div>
  `;
}

function restart() { current = 0; score = 0; answered = false; render(); }
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Fake — CT Deepfake Quiz</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="site-title">Spot the Fake CT</div>
  <h1>Could you spot a deepfake?</h1>
  <p class="subtitle">AI-generated images and fake quotes are becoming harder to detect. Take this quiz to test your skills — then learn what to look for.</p>
  <div id="quiz-area"></div>
</div>

<script>
const images = [
  { url: "image1.png", label: "AI-generated portrait — examine the skin and hairline closely" },
  { url: "image2.png", label: "AI-generated portrait — look at the edges of the face and hair" },
  { url: "image3.png", label: "AI-generated portrait — pay attention to the background details" }
];

const questions = [
  {
    type: "image", imgIndex: 0,
    prompt: "This face was generated entirely by AI. Which clue is most likely to give it away?",
    choices: ["Perfectly smooth, waxy-looking skin with no visible pores", "The subject is smiling", "The background is blurry", "The lighting looks natural"],
    correct: 0,
    feedback: "AI-generated faces often have unnaturally smooth skin with no visible pores or blemishes. Real human skin has texture, imperfections, and variation — AI struggles to replicate this convincingly."
  },
  {
    type: "headline",
    prompt: "One of these headlines is AI-generated fake news. Which one?",
    headlines: [
      { source: "CT Mirror", text: "Connecticut Senate passes AI bill criminalizing deepfake revenge porn in 24-12 vote" },
      { source: "Hartford Courant", text: "Gov. Lamont signs executive order banning all social media platforms from Connecticut schools" }
    ],
    choices: ["CT Mirror headline", "Hartford Courant headline"],
    correct: 1,
    feedback: "The CT Mirror headline is real — Connecticut's Senate did pass that AI bill in 2024. The Courant headline is fabricated. Notice the sweeping language ('all social media', 'banning') — a common pattern in AI-generated political fake news."
  },
  {
    type: "image", imgIndex: 1,
    prompt: "AI image generators frequently fail at a specific part of the face. What should you examine here?",
    choices: ["The ears look too small", "Hair strands blend unnaturally into the background or skin", "The eyes are too far apart", "The face is too symmetrical"],
    correct: 1,
    feedback: "AI generators frequently struggle with hair — especially where it meets skin or a background. Strands may blur, merge, or disappear entirely. This is one of the most reliable tells in AI-generated portraits."
  },
  {
    type: "headline",
    prompt: "Which of these quotes is AI-fabricated?",
    headlines: [
      { source: "CT Senate debate, 2024", text: "Sen. Saud Anwar (South Windsor): 'Not doing a bill on AI would be malpractice on the part of the legislative body.'" },
      { source: "Hartford Courant", text: "Gov. Lamont: 'Connecticut will lead the nation in AI regulation — we have a moral obligation to act first and act boldly.'" }
    ],
    choices: ["Sen. Anwar quote", "Gov. Lamont quote"],
    correct: 1,
    feedback: "Sen. Anwar's quote is real and on record from the 2024 CT Senate AI debate. The Lamont quote is fabricated — in reality Lamont repeatedly opposed aggressive AI regulation. AI fakes often use confident, sweeping language that sounds plausible but doesn't match a person's actual record."
  },
  {
    type: "image", imgIndex: 2,
    prompt: "All images in this quiz were AI-generated. What is the most common tell in AI background details?",
    choices: ["Backgrounds are always black", "Background details become warped, blurry, or structurally impossible", "Backgrounds are too colorful", "Backgrounds always show outdoor scenes"],
    correct: 1,
    feedback: "AI struggles with structural coherence in backgrounds — walls may warp, objects repeat strangely, or architecture becomes impossible. When something in the background looks off without a clear reason, that's a strong signal the image may be AI-generated."
  },
  {
    type: "headline",
    prompt: "A reporter shared this story on social media. Is it real or AI-generated?",
    headlines: [
      { source: "Cody Enterprise, Wyoming, 2024", text: "Governor's office: 'We have no record of that statement — it was never made.'" }
    ],
    choices: ["Real published denial", "AI-generated fake content"],
    correct: 0,
    feedback: "This is real. After reporter Aaron Pelczar used AI to fabricate a quote from Wyoming's governor in 2024, the governor's office issued exactly this denial after a competing journalist called to verify. The fake AI quote had passed through multiple human editors undetected — illustrating how convincing AI-generated content has become."
  }
];

let current = 0, score = 0, answered = false;

function render() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  let html = `
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-label">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.prompt}</div>
  `;
  if (q.type === "image") {
    const img = images[q.imgIndex];
    html += `<div class="image-box">
      <img src="${img.url}" alt="AI generated portrait" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="img-error" style="display:none">Image could not load — answer based on what you know about AI tells</div>
      <div class="img-label">${img.label}</div>
    </div>`;
  } else {
    html += `<div class="headline-box">`;
    q.headlines.forEach(h => {
      html += `<div><div class="headline-source">${h.source}</div><div class="headline-main">"${h.text}"</div></div>`;
    });
    html += `</div>`;
  }
  html += `<div class="choice-grid">`;
  q.choices.forEach((c, i) => {
    html += `<button class="choice-btn" onclick="pick(${i})">${c}</button>`;
  });
  html += `</div><div id="fb"></div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  document.querySelectorAll('.choice-btn').forEach((b, idx) => {
    b.onclick = null;
    if (idx === q.correct) b.className = 'choice-btn reveal';
    if (idx === i && i !== q.correct) b.className = 'choice-btn wrong';
    if (idx === i && i === q.correct) b.className = 'choice-btn correct';
  });
  if (i === q.correct) score++;
  document.getElementById('fb').innerHTML = `
    <div class="feedback ${i === q.correct ? 'correct' : 'wrong'}">
      <strong>${i === q.correct ? 'Correct.' : 'Not quite.'}</strong> ${q.feedback}
    </div>
    <button class="next-btn" onclick="next()">${current < questions.length - 1 ? 'Next question' : 'See results'}</button>
  `;
}

function next() {
  current++; answered = false;
  if (current < questions.length) render(); else results();
}

function results() {
  const p = Math.round((score / questions.length) * 100);
  let v, s;
  if (p >= 80) { v = "Strong result — but don't get overconfident."; s = "You spotted most of the fakes. But deepfake technology improves daily, and even trained experts are regularly fooled. The tells you learned today may not apply to next year's models."; }
  else if (p >= 50) { v = "About average — and that's the problem."; s = "Most Connecticut residents score similarly. When roughly half of AI-generated content fools us, that's not a personal failure — it's a systemic crisis that requires regulatory solutions, not just individual vigilance."; }
  else { v = "Difficult, right? That's exactly the point."; s = "You're not alone. Deepfakes are designed to be indistinguishable from reality. The difficulty you experienced is why researchers, journalists, and lawmakers argue that individual detection alone is not enough."; }

  document.getElementById('quiz-area').innerHTML = `
    <div class="score-screen">
      <div class="score-num">${score}/${questions.length}</div>
      <div class="score-label">You scored ${p}%</div>
      <div class="verdict">${v}</div>
      <div class="verdict-sub">${s}</div>
    </div>
    <div class="signs-section">
      <div class="signs-title">Warning signs to look for in AI-generated content</div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Skin:</strong> unnaturally smooth, waxy, or pore-free texture</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Hair:</strong> strands that blur, merge, or disappear at the edges</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Hands:</strong> wrong number of fingers, fused joints, or impossible bends</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Eyes:</strong> reflections that don't match, or a glassy unfocused look</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Background:</strong> warped structures, repeated objects, or impossible architecture</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Language:</strong> AI fake quotes often sound sweeping, confident, and too perfectly phrased</div></div>
      <div class="sign-item"><div class="sign-dot"></div><div class="sign-text"><strong>Source:</strong> always verify quotes and claims with a second source before sharing</div></div>
    <div style="text-align:center"><button class="restart-btn" onclick="restart()">Try again</button></div>
  `;
}

function restart() { current = 0; score = 0; answered = false; render(); }
render();
</script>
</body>
</html>
